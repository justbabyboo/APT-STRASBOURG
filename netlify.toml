# Site statique : pas de build, publication à la racine du dépôt.
[build]
  publish = "."
  command = ""

# Anti-cache sur le HTML : le navigateur revalide à chaque visite,
# donc les nouvelles modifs s'affichent sans avoir à vider le cache.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
